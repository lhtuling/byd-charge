<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BYD兆瓦闪充极端测试</title>
    <style>
        :root {
            --bg: #05070a;
            --card: #12161f;
            --grid: #00d2ff;
            --storage: #00ff88;
            --car: #ff9f00;
            --text: #ffffff;
            --danger: #ff4d4d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 配置区 */
        .config-panel { padding: 12px 15px; background: #0d1117; border-bottom: 1px solid #21262d; }
        .config-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .config-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; padding-left: 2px; }
        .opt {
            flex: 1; text-align: center; padding: 10px; border-radius: 8px; font-size: 11px;
            background: #1c222d; color: #8b949e; border: 1px solid transparent; transition: all 0.2s;
        }
        .opt.active-g { background: rgba(0, 210, 255, 0.15); color: var(--grid); border-color: var(--grid); font-weight: bold; }
        .opt.active-s { background: rgba(0, 255, 136, 0.15); color: var(--storage); border-color: var(--storage); font-weight: bold; }

        /* 舞台区 */
        .stage { flex: 1; display: flex; flex-direction: column; justify-content: space-around; padding: 5px 20px; }
        .node { background: var(--card); border-radius: 12px; padding: 12px; border: 1px solid #2d3748; position: relative; }
        .tag { position: absolute; top: -10px; right: 10px; font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #333; }

        /* 流向动画 */
        .flow-container { height: 30px; position: relative; display: flex; justify-content: center; }
        .line { width: 1px; height: 100%; background: #2d3748; position: relative; }
        .dot {
            width: 6px; height: 6px; background: var(--grid); border-radius: 50%;
            position: absolute; left: -2.5px; top: -10px; opacity: 0;
        }
        @keyframes flowDown { 0% { top: 0%; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .flowing .dot { animation: flowDown 0.4s linear infinite; }
        .flowing#f2 .dot { background: var(--car); box-shadow: 0 0 10px var(--car); width: 8px; height: 8px; left: -3.5px; }

        /* 数值显示 */
        .val-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 5px; }
        .val { font-size: 22px; font-weight: bold; font-family: 'Courier New', monospace; }
        .unit { font-size: 10px; color: #4a5568; margin-left: 2px; }
        .label-text { font-size: 11px; color: #8b949e; }

        /* 进度条 */
        .progress-wapper { height: 4px; background: #000; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; width: 100%; transition: width 0.1s linear; }

        /* 底部统计 */
        .footer { background: #161b22; padding: 15px 20px 25px; border-radius: 20px 20px 0 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .stat-box { background: #0d1117; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #21262d; }
        .stat-val { font-size: 18px; font-weight: bold; color: #fff; }

        button {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--grid); color: #000; font-weight: bold; font-size: 16px;
        }
        button.stop { background: var(--danger); color: #fff; }

        .info-bar { text-align: center; font-size: 10px; color: #4e5761; margin-top: 8px; }
        .mode-flash { color: var(--car); font-weight: bold; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="config-panel">
        <div class="config-label">电网接入能力 (变压器容量)</div>
        <div class="config-row">
            <div class="opt active-g" id="g-160" onclick="changeConfig('grid', 160)">160kW (民用免批)</div>
            <div class="opt" id="g-560" onclick="changeConfig('grid', 560)">560kW (工业高压)</div>
        </div>
        <div class="config-label">储能柜配置 (当前可选)</div>
        <div class="config-row">
            <div class="opt active-s" id="s-2" onclick="changeConfig('storage', 2)">双储能柜 (370kWh)</div>
            <div class="opt" id="s-4" onclick="changeConfig('storage', 4)">四储能柜 (740kWh)</div>
        </div>
    </div>

    <div class="stage">
        <!-- 电网 -->
        <div class="node">
            <div class="tag" style="background:var(--grid); color:#000">GRID</div>
            <div class="label-text">电网输入功率</div>
            <div class="val-row">
                <div class="val" id="ui-grid-pwr" style="color:var(--grid)">160<span class="unit">kW</span></div>
                <div class="label-text" id="ui-grid-status">恒定补能</div>
            </div>
        </div>

        <div class="flow-container" id="f1"><div class="line"></div><div class="dot"></div></div>

        <!-- 储能 -->
        <div class="node" style="border-left: 3px solid var(--storage)">
            <div class="tag" style="background:var(--storage); color:#000">BESS</div>
            <div class="label-text">储能系统 (双向调度源)</div>
            <div class="val-row">
                <div class="val" id="ui-st-soc" style="color:var(--storage)">100%</div>
                <div class="val" style="font-size:14px" id="ui-st-kwh">370.0<span class="unit">kWh</span></div>
            </div>
            <div class="progress-wapper">
                <div class="progress-fill" id="ui-st-bar" style="background:var(--storage)"></div>
            </div>
        </div>

        <div class="flow-container" id="f2"><div class="line"></div><div class="dot"></div></div>

        <!-- 车辆 -->
        <div class="node" style="border-left: 3px solid var(--car)">
            <div class="tag" style="background:var(--car); color:#000">Denza Z9GT</div>
            <div class="label-text">兆瓦级闪充输出 (10% → 97%)</div>
            <div class="val-row">
                <div class="val" id="ui-car-soc" style="color:var(--car)">10.0%</div>
                <div class="val" style="font-size:14px" id="ui-total-pwr">0<span class="unit">kW</span></div>
            </div>
            <div class="progress-wapper">
                <div class="progress-fill" id="ui-car-bar" style="background:var(--car); width:0%"></div>
            </div>
            <div class="label-text" id="ui-curve-info" style="margin-top:8px; font-size:10px; color:var(--car)">
                等待启动...
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="stats-grid">
            <div class="stat-box">
                <div class="label-text">连续闪充台数</div>
                <div class="stat-val" id="ui-count">0</div>
            </div>
            <div class="stat-box">
                <div class="label-text">储能实时出力</div>
                <div class="stat-val" id="ui-st-out" style="color:var(--storage)">0<span style="font-size:10px">kW</span></div>
            </div>
        </div>
        <button id="main-btn" onclick="toggleSim()">启动 1500kW 压力测试</button>
        <div class="info-bar" id="ui-sys-info">配置变更将重置储能电量</div>
    </div>

<script>
    // 基础配置
    let state = {
        isRunning: false,
        gridLimit: 160,
        cabCount: 2,
        maxKwh: 370,
        curKwh: 370,
        carSoc: 10,
        carTotal: 122.5,
        isCharging: false,
        count: 0,
        simSpeed: 10, // 仿真速度
        timer: null
    };

    // 1. 获取 1500kW 模拟曲线功率
    function getCurvePower(soc) {
        let p = 0;
        let info = "";
        
        if (soc < 20) {
            // 阶段 1: 10-20% 快速拉升 (600 -> 1500)
            p = 600 + (1500 - 600) * ((soc - 10) / 10);
            p += (Math.random() - 0.5) * 50; // 小幅抖动
            info = "阶段1: 瞬时拉升至峰值功率";
        } else if (soc < 70) {
            // 阶段 2: 20-70% 呼吸波动 (1200 - 1500)
            p = 1350 + Math.sin(Date.now() / 500) * 150; 
            p += (Math.random() - 0.5) * 40; // 真实物理波动
            info = "阶段2: 1500kW 兆瓦级呼吸爆发";
        } else if (soc < 90) {
            // 阶段 3: 70-90% 阶梯跌落
            if (soc < 74) p = 1500;
            else if (soc < 78) p = 1300;
            else if (soc < 82) p = 1100;
            else if (soc < 86) p = 900;
            else p = 700;
            info = "阶段3: 电芯高压阶梯降流";
        } else {
            // 阶段 4: 90-97% 快速平稳下滑 (500 -> 200)
            p = 500 - (300 * ((soc - 90) / 7));
            info = "阶段4: 涓流收尾";
        }
        return { p: Math.max(0, p), info };
    }

    // 2. 配置切换
    window.changeConfig = function(type, val) {
        state.isRunning = false;
        if (state.timer) clearTimeout(state.timer);
        
        if (type === 'grid') {
            state.gridLimit = val;
            document.getElementById('g-160').classList.toggle('active-g', val === 160);
            document.getElementById('g-560').classList.toggle('active-g', val === 560);
            document.getElementById('ui-grid-pwr').innerHTML = `${val}<span class="unit">kW</span>`;
        } else {
            state.cabCount = val;
            state.maxKwh = val * 185;
            document.getElementById('s-2').classList.toggle('active-s', val === 2);
            document.getElementById('s-4').classList.toggle('active-s', val === 4);
        }
        
        state.curKwh = state.maxKwh;
        state.count = 0;
        state.carSoc = 10;
        state.isCharging = false;
        
        resetUI();
    };

    function resetUI() {
        document.getElementById('main-btn').innerText = "启动 1500kW 压力测试";
        document.getElementById('main-btn').classList.remove('stop');
        document.getElementById('ui-car-soc').innerText = "10.0%";
        document.getElementById('ui-car-bar').style.width = "0%";
        document.getElementById('ui-total-pwr').innerHTML = `0<span class="unit">kW</span>`;
        document.getElementById('ui-count').innerText = "0";
        document.getElementById('f1').classList.remove('flowing');
        document.getElementById('f2').classList.remove('flowing');
        document.getElementById('ui-st-out').innerText = "0";
        document.getElementById('ui-curve-info').innerText = "等待启动...";
        updateStorageUI();
    }

    function updateStorageUI() {
        let pct = (state.curKwh / state.maxKwh) * 100;
        document.getElementById('ui-st-soc').innerText = Math.max(0, pct).toFixed(1) + "%";
        document.getElementById('ui-st-kwh').innerHTML = `${Math.max(0, state.curKwh).toFixed(1)}<span class="unit">kWh</span>`;
        document.getElementById('ui-st-bar').style.width = Math.max(0, pct) + "%";
    }

    // 3. 运行控制
    window.toggleSim = function() {
        state.isRunning = !state.isRunning;
        const btn = document.getElementById('main-btn');
        btn.innerText = state.isRunning ? "停止模拟运行" : "启动 1500kW 压力测试";
        btn.classList.toggle('stop', state.isRunning);
        if (state.isRunning) loop();
    }

    // 4. 核心循环
    function loop() {
        if (!state.isRunning) return;

        const dt = 0.05; // 仿真时间步长

        if (!state.isCharging) {
            // 等待进车或补能阶段
            document.getElementById('ui-total-pwr').innerHTML = `0<span class="unit">kW</span>`;
            document.getElementById('f2').classList.remove('flowing');
            document.getElementById('ui-curve-info').innerText = "正在等待下一台腾势 Z9GT...";
            
            // 电网为储能柜补电
            if (state.curKwh < state.maxKwh) {
                state.curKwh += (state.gridLimit / 60) * dt;
                document.getElementById('f1').classList.add('flowing');
            } else {
                document.getElementById('f1').classList.remove('flowing');
            }

            // 模拟 2秒后 进车
            if (Math.random() < 0.05) {
                state.isCharging = true;
                state.carSoc = 10;
            }
        } else {
            // 正在充电阶段
            let curve = getCurvePower(state.carSoc);
            let targetPwr = curve.p;
            
            // 判定储能柜是否能支撑目标功率
            // 储能需要出力 = 目标功率 - 电网功率
            let stNeedPwr = targetPwr - state.gridLimit;
            let actualStOut = state.curKwh > 0.5 ? stNeedPwr : 0;
            let finalPwr = state.gridLimit + actualStOut;

            // 如果储能掏空，功率跌落
            if (actualStOut < stNeedPwr && stNeedPwr > 0) {
                document.getElementById('ui-curve-info').innerText = "警告：储能掏空，闪充中断，功率回落至电网基准";
                document.getElementById('ui-curve-info').style.color = "var(--danger)";
            } else {
                document.getElementById('ui-curve-info').innerText = curve.info;
                document.getElementById('ui-curve-info').style.color = "var(--car)";
            }

            // 物理数值更新
            // 充入电量 (kWh) = 功率 * 时间(h)
            let energyIn = (finalPwr / 60) * dt;
            state.carSoc += (energyIn / state.carTotal) * 100;
            state.curKwh -= (actualStOut / 60) * dt;

            // UI 更新
            document.getElementById('ui-total-pwr').innerHTML = `${finalPwr.toFixed(0)}<span class="unit">kW</span>`;
            document.getElementById('ui-st-out').innerText = actualStOut.toFixed(0);
            document.getElementById('ui-car-soc').innerText = Math.min(97, state.carSoc).toFixed(1) + "%";
            document.getElementById('ui-car-bar').style.width = ((state.carSoc - 10) / 87 * 100) + "%";
            document.getElementById('f1').classList.add('flowing');
            document.getElementById('f2').classList.add('flowing');

            if (state.carSoc >= 97) {
                state.isCharging = false;
                state.count++;
                document.getElementById('ui-count').innerText = state.count;
            }
        }

        updateStorageUI();
        state.timer = setTimeout(loop, 50);
    }

    // 初始化显示
    updateStorageUI();
</script>
</body>
</html>
